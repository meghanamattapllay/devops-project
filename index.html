<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Email Generator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>Smart Email Generator</h1>
  <p>Create professional emails instantly</p>

  <!-- FORM -->
  <form id="emailForm">

    <label>Email Type</label>
    <select id="type">
      <option>Leave Request</option>
      <option>Apology</option>
      <option>Thank You</option>
      <option>Invitation</option>
      <option>Meeting</option>
      <option>Complaint</option>
      <option>Resignation</option>
      <option>Follow-up</option>
    </select>

    <label>Tone</label>
    <select id="tone">
      <option>Professional</option>
      <option>Friendly</option>
      <option>Formal</option>
    </select>

    <label>Subject (optional)</label>
    <input type="text" id="subject" placeholder="Enter subject">

    <label>Recipient</label>
    <input type="text" id="recipient" placeholder="e.g., Manager / Sir / HR">

    <label>Details</label>
    <textarea id="details" placeholder="Enter details here..."></textarea>

    <button type="submit" id="generateBtn">Generate Email 🚀</button>

  </form>

  <!-- RESULT (HIDDEN FIRST) -->
  <div id="resultSection" class="result hidden">

    <h2>📨 Generated Email</h2>

    <h3>Subject</h3>
    <p id="outSubject"></p>

    <h3>Body</h3>
    <pre id="outBody"></pre>

    <button onclick="copyEmail()">Copy Email 📋</button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
