name: Build Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # ✅ Backend Install (REAL)
      - name: Install Backend
        working-directory: backend
        run: npm install

      # ✅ Run Backend (REAL)
      - name: Run Backend
        working-directory: backend
        run: node server.js &
        sleep 5 # Wait for the backend to start

      # ✅ Frontend Install (REAL)
      - name: Install Frontend
        run: npm install

      # ✅ Build Frontend (REAL)
      - name: Build Frontend
        run: npm run build