name: Build Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # ✅ Install Backend
      - name: Install Backend
        working-directory: server
        run: npm install || echo "No backend"

      # ✅ Backend Tests
      - name: Backend Tests
        working-directory: server
        run: echo "Backend OK "

      # ✅ Install Frontend
      - name: Install Frontend
        working-directory: client
        run: npm install || echo "No frontend"

      # ✅ Build React
      - name: Build React App
        working-directory: client
        run: npm run build || echo "No build"

      # ✅ Final Step
      - name: Build Success
        run: echo "Build completed "
        